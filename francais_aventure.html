
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Français Aventure!</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;800&family=Nunito:wght@400;600;700&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Nunito', sans-serif; background: #0f0e17; color: #fffffe; min-height: 100vh; }
  .bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0;
    background: radial-gradient(ellipse at 20% 50%, #1a0533 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, #001833 0%, transparent 50%), #0f0e17; }
  .container { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 20px; }
  .header { text-align: center; padding: 24px 0 16px; }
  .header h1 { font-family: 'Baloo 2', cursive; font-size: 2.4rem; font-weight: 800;
    background: linear-gradient(135deg, #ff6b6b, #feca57, #48dbfb, #ff9ff3);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; line-height: 1.1; }
  .header p { color: #a8a4c8; margin-top: 4px; font-size: 0.95rem; }
  .xp-bar-wrap { background: #1a1830; border-radius: 30px; padding: 10px 18px;
    display: flex; align-items: center; gap: 12px; margin-bottom: 8px; border: 1px solid #2e2b4a; }
  .xp-label { font-weight: 700; font-size: 0.82rem; color: #feca57; white-space: nowrap; }
  .xp-track { flex: 1; height: 9px; background: #2e2b4a; border-radius: 20px; overflow: hidden; }
  .xp-fill { height: 100%; background: linear-gradient(90deg, #ff6b6b, #feca57); border-radius: 20px; transition: width 0.6s ease; }
  .score-badge { background: linear-gradient(135deg, #ff6b6b, #feca57); color: #0f0e17; font-weight: 800;
    font-size: 0.85rem; padding: 3px 11px; border-radius: 20px; white-space: nowrap; }
  .save-note { text-align: right; font-size: 0.74rem; color: #4a4870; margin-bottom: 16px; }
  .save-note span { color: #6a6890; }
  .mode-tabs { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
  .mode-tab { flex: 1; min-width: 110px; background: #1a1830; border: 2px solid #2e2b4a;
    color: #a8a4c8; padding: 11px 8px; border-radius: 14px; cursor: pointer;
    font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 0.88rem; text-align: center; transition: all 0.2s; }
  .mode-tab:hover { border-color: #48dbfb; color: #48dbfb; }
  .mode-tab.active { background: #48dbfb22; border-color: #48dbfb; color: #48dbfb; }
  .mode-tab .tab-emoji { display: block; font-size: 1.4rem; margin-bottom: 3px; }
  .card { background: #1a1830; border: 1px solid #2e2b4a; border-radius: 20px; padding: 26px;
    margin-bottom: 16px; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  .card-top { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
  .card-badge { display: inline-block; font-size: 0.72rem; font-weight: 700; padding: 3px 10px;
    border-radius: 20px; text-transform: uppercase; letter-spacing: 0.05em; }
  .badge-lecture { background: #ff6b6b33; color: #ff6b6b; }
  .badge-grammaire { background: #feca5733; color: #feca57; }
  .badge-conjugaison { background: #48dbfb33; color: #48dbfb; }
  .theme-label { display: inline-block; font-size: 0.76rem; font-weight: 700; padding: 3px 10px;
    border-radius: 20px; background: #ffffff12; color: #a8a4c8; }
  .q-counter { margin-left: auto; font-size: 0.76rem; color: #6a6890; font-weight: 700; }
  /* passage */
  .passage { font-size: 0.98rem; line-height: 1.85; color: #d4d0f0; background: #12112a;
    border-radius: 12px; padding: 18px 20px; margin-bottom: 18px; border-left: 3px solid #ff9ff3;
    user-select: text; }
  .passage p { margin-bottom: 11px; }
  .passage p:last-child { margin-bottom: 0; }
  /* clickable word spans */
  .passage .w { cursor: pointer; border-radius: 3px; transition: background 0.15s; }
  .passage .w:hover { background: #48dbfb22; color: #48dbfb; }
  .passage .w.active { background: #48dbfb33; color: #48dbfb; }
  /* passage image */
  .passage-img-wrap { margin: 0; display: flex; justify-content: center; }
  .passage-img-wrap img { width: 100%; max-width: 640px; height: auto; display: block;
    border-radius: 12px; }
  .passage-img-wrap .img-loading { color: #4a4870; font-size: 0.8rem; padding: 20px; }
  /* seamless passage split around image */
  .passage-top { border-radius: 12px 12px 0 0 !important; margin-bottom: 0 !important;
    padding-bottom: 14px !important; }
  .passage-bottom { border-radius: 0 0 12px 12px !important; margin-top: 0 !important;
    padding-top: 14px !important; border-top: none !important; }
  /* dictionary tip banner */
  .dict-tip-banner {
    background: #48dbfb12; border: 1px solid #48dbfb33;
    border-radius: 10px; padding: 9px 14px;
    font-size: 0.84rem; color: #a8c8d8; margin-bottom: 12px;
    line-height: 1.4;
  }
  .dict-tip-banner strong { color: #48dbfb; }
  /* translation tooltip */
  #dictTooltip {
    position: fixed; z-index: 9999;
    background: #1a1830; border: 1px solid #48dbfb55;
    border-radius: 14px; padding: 13px 16px 12px;
    box-shadow: 0 8px 32px #00000088;
    min-width: 180px; max-width: 260px;
    animation: fadeIn 0.15s ease;
    pointer-events: auto;
  }
  #dictTooltip .dict-word {
    font-family: 'Baloo 2', cursive; font-size: 1rem; font-weight: 800;
    color: #a8a4c8; margin-bottom: 4px;
  }
  #dictTooltip .dict-translation {
    font-size: 1.1rem; font-weight: 800; color: #48dbfb; line-height: 1.3;
  }
  #dictTooltip .dict-close {
    position: absolute; top: 8px; right: 10px;
    background: none; border: none; color: #4a4870;
    cursor: pointer; font-size: 1rem; line-height: 1;
    font-family: 'Nunito', sans-serif;
  }
  #dictTooltip .dict-close:hover { color: #a8a4c8; }
  #dictTooltip .dict-unknown {
    font-size: 0.82rem; color: #4a4870; font-style: italic; margin-top: 2px;
  }
  /* question within passage card */
  .q-divider { border: none; border-top: 1px solid #2e2b4a; margin: 18px 0; }
  .q-label { font-size: 0.76rem; font-weight: 700; color: #48dbfb; text-transform: uppercase;
    letter-spacing: 0.08em; margin-bottom: 8px; }
  .q-dot-row { display: flex; gap: 6px; margin-bottom: 14px; }
  .q-dot { width: 10px; height: 10px; border-radius: 50%; background: #2e2b4a; transition: background 0.3s; cursor: pointer; }
  .q-dot:hover { transform: scale(1.3); }
  .q-dot.done-correct { background: #1dd1a1; }
  .q-dot.done-correct:hover { background: #25f0b5; }
  .q-dot.done-wrong { background: #ff6b6b; }
  .q-dot.done-wrong:hover { background: #ff8585; }
  .q-dot.active { background: #48dbfb; }
  .question-text { font-size: 1.08rem; font-weight: 700; color: #fffffe; margin-bottom: 14px; line-height: 1.4; }
  .options { display: flex; flex-direction: column; gap: 9px; }
  .option-btn { background: #12112a; border: 2px solid #2e2b4a; color: #d4d0f0; padding: 12px 16px;
    border-radius: 12px; cursor: pointer; font-family: 'Nunito', sans-serif; font-size: 0.97rem;
    font-weight: 600; text-align: left; transition: all 0.2s; display: flex; align-items: center; gap: 11px; }
  .option-btn:hover:not(:disabled) { border-color: #48dbfb; color: #48dbfb; background: #48dbfb11; }
  .option-btn.correct { border-color: #1dd1a1; background: #1dd1a122; color: #1dd1a1; }
  .option-btn.wrong { border-color: #ff6b6b; background: #ff6b6b22; color: #ff6b6b; }
  .option-btn:disabled { cursor: default; }
  .option-letter { width: 26px; height: 26px; border-radius: 50%; background: #2e2b4a;
    display: flex; align-items: center; justify-content: center; font-size: 0.78rem; font-weight: 800; flex-shrink: 0; }
  .option-btn.correct .option-letter { background: #1dd1a1; color: #0f0e17; }
  .option-btn.wrong .option-letter { background: #ff6b6b; color: #0f0e17; }
  /* blank */
  .blank-input { background: #12112a; border: 2px solid #48dbfb; color: #fffffe; padding: 10px 14px;
    border-radius: 10px; font-family: 'Nunito', sans-serif; font-size: 1.08rem; font-weight: 700;
    outline: none; width: 210px; text-align: center; transition: border-color 0.2s; }
  .blank-input:focus { border-color: #ff9ff3; }
  .blank-input.correct { border-color: #1dd1a1; background: #1dd1a122; }
  .blank-input.wrong { border-color: #ff6b6b; background: #ff6b6b22; }
  .blank-wrap { display: flex; align-items: center; gap: 11px; flex-wrap: wrap; margin: 14px 0; }
  /* feedback */
  .feedback { margin-top: 14px; padding: 13px 16px; border-radius: 12px; font-weight: 600;
    font-size: 0.93rem; line-height: 1.6; animation: fadeIn 0.2s ease; }
  .feedback.success { background: #1dd1a122; border: 1px solid #1dd1a1; color: #1dd1a1; }
  .feedback.fail { background: #ff6b6b22; border: 1px solid #ff6b6b; color: #ff9ff3; }
  .feedback .expl { color: #d4d0f0; font-weight: 400; margin-top: 5px; }
  .feedback .tip { color: #feca57; margin-top: 7px; }
  /* buttons */
  .btn { padding: 12px 26px; border-radius: 14px; border: none; font-family: 'Nunito', sans-serif;
    font-weight: 800; font-size: 0.97rem; cursor: pointer; transition: all 0.2s; }
  .btn-primary { background: linear-gradient(135deg, #48dbfb, #ff9ff3); color: #0f0e17; }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 18px #48dbfb44; }
  .btn-ghost { background: #2e2b4a; color: #a8a4c8; font-size: 0.82rem; padding: 8px 14px; border-radius: 10px; }
  .btn-ghost:hover { background: #3d3a5c; color: #fffffe; }
  .actions { display: flex; gap: 10px; margin-top: 18px; flex-wrap: wrap; align-items: center; }
  /* streak */
  .streak { text-align: center; padding: 6px; font-size: 0.92rem; color: #feca57; font-weight: 700; margin-bottom: 6px; }
  /* pills */
  .pill { background: #48dbfb22; color: #48dbfb; padding: 3px 11px; border-radius: 20px;
    font-size: 0.82rem; font-weight: 700; display: inline-block; margin: 2px; }
  .pill.pink { background: #ff9ff333; color: #ff9ff3; }
  .pill.yellow { background: #feca5722; color: #feca57; }
  /* level badges */
  .niveau-badge { display:inline-flex; align-items:center; padding:4px 12px; border-radius:20px;
    font-size:0.72rem; font-weight:800; letter-spacing:0.08em; text-transform:uppercase; }
  .niveau-1 { background:#1dd1a118; color:#1dd1a1; border:1px solid #1dd1a140; }
  .niveau-2 { background:#ffb34720; color:#ffb347; border:1px solid #ffb34750; }
  .niveau-3 { background:#ff6b6b20; color:#ff6b6b; border:1px solid #ff6b6b50; }
  /* level filter */
  .level-filter { display:flex; gap:8px; margin-bottom:18px; flex-wrap:wrap; align-items:center; }
  .level-filter-label { font-size:0.78rem; font-weight:700; color:#a8a4c8; margin-right:2px; }
  .lvl-btn { background:#12112a; border:2px solid #2e2b4a; color:#a8a4c8;
    padding:5px 13px; border-radius:20px; cursor:pointer; font-family:'Nunito',sans-serif;
    font-size:0.8rem; font-weight:700; transition:all 0.2s; }
  .lvl-btn:hover { border-color:#48dbfb; color:#48dbfb; }
  .lvl-btn.active { border-color:#48dbfb; background:#48dbfb22; color:#48dbfb; }
  /* accordion */
  .plus-loin-wrap { margin-top:14px; }
  .plus-loin-toggle { background:#1a1830; border:1px solid #2e2b4a; color:#a8a4c8;
    padding:9px 16px; border-radius:10px; cursor:pointer; font-family:'Nunito',sans-serif;
    font-size:0.85rem; font-weight:700; width:100%; text-align:left; transition:all 0.2s;
    display:flex; align-items:center; gap:8px; }
  .plus-loin-toggle:hover { border-color:#48dbfb; color:#48dbfb; }
  .plus-loin-toggle .arrow { transition:transform 0.2s; display:inline-block; }
  .plus-loin-toggle.open .arrow { transform:rotate(90deg); }
  .plus-loin-body { background:#0d0c1f; border:1px solid #2e2b4a; border-radius:10px;
    padding:16px 18px; margin-top:6px; font-size:0.88rem; line-height:1.75; color:#d4d0f0;
    display:none; }
  .plus-loin-body.open { display:block; animation:fadeIn 0.2s ease; }
  /* progress view */
  .prog-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; flex-wrap:wrap; gap:10px; }
  .prog-title { font-family:'Baloo 2',cursive; font-size:1.5rem; font-weight:800; color:#fffffe; }
  .stat-row { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:22px; }
  .stat-box { flex:1; min-width:100px; background:#12112a; border:1px solid #2e2b4a; border-radius:14px; padding:14px 12px; text-align:center; }
  .stat-num { font-family:'Baloo 2',cursive; font-size:1.8rem; font-weight:800; line-height:1; }
  .stat-num.green { color:#1dd1a1; } .stat-num.red { color:#ff6b6b; } .stat-num.blue { color:#48dbfb; } .stat-num.yellow { color:#feca57; }
  .stat-lbl { font-size:0.74rem; color:#a8a4c8; font-weight:700; margin-top:4px; text-transform:uppercase; letter-spacing:0.05em; }
  .log-section { margin-bottom:18px; }
  .log-section-title { font-size:0.78rem; font-weight:800; text-transform:uppercase; letter-spacing:0.08em;
    color:#a8a4c8; margin-bottom:8px; padding-bottom:6px; border-bottom:1px solid #2e2b4a; }
  .log-entry { background:#12112a; border-radius:10px; padding:10px 14px; margin-bottom:6px;
    display:flex; gap:12px; align-items:flex-start; border-left:3px solid #2e2b4a; }
  .log-entry.ok { border-left-color:#1dd1a1; }
  .log-entry.ko { border-left-color:#ff6b6b; }
  .log-icon { font-size:1rem; flex-shrink:0; margin-top:1px; }
  .log-body { flex:1; min-width:0; }
  .log-q { font-size:0.88rem; font-weight:700; color:#fffffe; margin-bottom:3px; line-height:1.3; }
  .log-ans { font-size:0.8rem; color:#a8a4c8; line-height:1.4; }
  .log-ans .given { color:#ff9ff3; font-weight:700; }
  .log-ans .correct-ans { color:#1dd1a1; font-weight:700; }
  .log-time { font-size:0.72rem; color:#4a4870; margin-top:3px; }
  .log-theme { font-size:0.7rem; background:#ffffff10; color:#a8a4c8; padding:2px 7px; border-radius:10px;
    display:inline-block; margin-bottom:3px; }
  .empty-log { text-align:center; padding:40px 20px; color:#4a4870; font-size:0.95rem; }
  .export-btn { background:#2e2b4a; color:#a8a4c8; border:none; padding:8px 16px; border-radius:10px;
    font-family:'Nunito',sans-serif; font-weight:700; font-size:0.82rem; cursor:pointer; }
  .export-btn:hover { background:#3d3a5c; color:#fffffe; }
  /* sidebar layout */
  .app-layout { display:flex; gap:18px; align-items:flex-start; }
  .sidebar { width:200px; flex-shrink:0; position:sticky; top:20px; max-height:90vh; overflow-y:auto; }
  .sidebar::-webkit-scrollbar { width:4px; }
  .sidebar::-webkit-scrollbar-thumb { background:#2e2b4a; border-radius:4px; }
  .sidebar-title { font-size:0.7rem; font-weight:800; text-transform:uppercase;
    letter-spacing:0.08em; color:#6a6890; margin-bottom:8px; padding:0 4px; }
  .si-group { margin-bottom: 4px; }
  .si-group-header { display: flex; align-items: center; gap: 8px; padding: 8px 10px;
    border-radius: 10px; cursor: pointer; transition: all 0.18s;
    background: #12112a; border: 1px solid #2e2b4a; user-select: none; }
  .si-group-header:hover { background: #1a1830; border-color: #3a3860; }
  .si-group-header.has-active { border-color: #48dbfb55; background: #48dbfb08; }
  .si-group-label { flex: 1; font-size: 0.75rem; font-weight: 800; color: #d4d0f0;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .si-group-arrow { font-size: 0.65rem; color: #4a4870; transition: transform 0.2s; flex-shrink: 0; }
  .si-group-arrow.open { transform: rotate(90deg); }
  .si-group-body { overflow: hidden; max-height: 0; transition: max-height 0.25s ease; }
  .si-group-body.open { max-height: 200px; }
  .si-group-body .si { margin-left: 8px; border-radius: 8px; }
    border-radius:10px; cursor:pointer; transition:all 0.18s; margin-bottom:3px;
    border:1px solid transparent; background:#1a1830; }
  .si:hover { border-color:#2e2b4a; background:#201e38; }
  .si.si-active { background:#48dbfb12; border-color:#48dbfb44; }
  .si.si-active .si-num { color:#48dbfb; }
  .si.si-done .si-num { color:#1dd1a1; }
  .si-num { font-size:0.68rem; font-weight:800; color:#4a4870;
    width:16px; flex-shrink:0; padding-top:1px; }
  .si-info { flex:1; min-width:0; }
  .si-theme { font-size:0.72rem; font-weight:700; color:#a8a4c8; line-height:1.35;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .si-dots { display:flex; gap:3px; margin-top:4px; }
  .si-dot { width:6px; height:6px; border-radius:50%; background:#2e2b4a; }
  .si-dot.ok { background:#1dd1a1; }
  .si-dot.ko { background:#ff6b6b; }
  .main-content { flex:1; min-width:0; }
  @media(max-width:680px) {
    .app-layout { flex-direction:column; }
    .sidebar { width:100%; position:static; max-height:none;
      display:flex; flex-wrap:nowrap; overflow-x:auto; gap:6px; padding-bottom:4px; }
    .sidebar-title { display:none; }
    .si { flex-shrink:0; flex-direction:row; min-width:80px; }
    .si-dots { display:none; }
  }
</style>
</head>
<body>
<div class="bg"></div>
<div class="container">
  <div class="header">
    <h1>&#127467;&#127479; Fran&#231;ais Aventure!</h1>
    <p>Lis, apprends et deviens un champion du fran&#231;ais &#127942;</p>
  </div>

  <div class="xp-bar-wrap">
    <span class="xp-label">&#9889; XP</span>
    <div class="xp-track"><div class="xp-fill" id="xpFill" style="width:0%"></div></div>
    <div class="score-badge" id="scoreBadge">0 pts</div>
  </div>
  <div class="save-note">&#128190; Progression sauvegard&#233;e automatiquement &mdash; <span id="saveStatus">chargement...</span></div>

  <div id="streakDiv" class="streak" style="display:none"></div>

  <div class="mode-tabs">
    <button class="mode-tab active" onclick="switchMode('lecture',this)">
      <span class="tab-emoji">&#128218;</span>Compr&#233;hension
    </button>
    <button class="mode-tab" onclick="switchMode('grammaire',this)">
      <span class="tab-emoji">&#128292;</span>Grammaire
    </button>
    <button class="mode-tab" onclick="switchMode('conjugaison',this)">
      <span class="tab-emoji">&#9881;&#65039;</span>Conjugaison
    </button>
    <button class="mode-tab" id="tabProgress" onclick="showProgress()">
      <span class="tab-emoji">&#128202;</span>Progr&#232;s
    </button>
  </div>

  <div id="levelFilterBar" class="level-filter" style="display:none">
    <span class="level-filter-label">&#127919; Niveau :</span>
    <button class="lvl-btn active" onclick="setLevel(0,this)">Tous</button>
    <button class="lvl-btn" onclick="setLevel(1,this)">FACILE</button>
    <button class="lvl-btn" onclick="setLevel(2,this)">MOYEN</button>
    <button class="lvl-btn" onclick="setLevel(3,this)">DIFFICILE</button>
  </div>

  <div class="app-layout">
    <div class="sidebar" id="sidebar" style="display:none">
      <div class="sidebar-title">&#128218; Textes</div>
      <div id="sidebarList"></div>
    </div>
    <div class="main-content">
      <div id="mainCard" class="card"></div>
    </div>
  </div>

  <div id="dictTooltip" style="display:none">
    <button class="dict-close" onclick="closeDict()">&#10005;</button>
    <div class="dict-word" id="dictWord"></div>
    <div class="dict-translation" id="dictTranslation"></div>
    <div class="dict-unknown" id="dictUnknown" style="display:none">pas de traduction disponible</div>
  </div>
  <div class="reset-bar"><button class="btn-ghost btn" onclick="confirmReset()">&#128256; Recommencer &#224; z&#233;ro</button></div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════
//  BANKS
// ═══════════════════════════════════════════════════════════════════
const LECTURE = [
  {
    theme:"&#127912; Art",
    titre:"La Joconde",
    wikiTerm:"Mona_Lisa",
    passage:"<p>La Joconde est le tableau le plus célèbre du monde. Elle a été peinte par Léonard de Vinci, un artiste et inventeur italien génial, il y a plus de 500 ans. Au départ, c'était simplement le portrait d'une femme appelée Lisa Gherardini. Léonard a mis seize ans pour le terminer, en perfectionnant chaque détail.</p><p>Ce qui rend ce tableau si mystérieux, c'est le sourire de Lisa. On ne sait pas vraiment si elle sourit ou non — son expression semble changer selon l'angle depuis lequel on regarde. Léonard utilisait une technique spéciale appelée sfumato, qui consiste à mélanger les couleurs pour créer des contours très doux.</p><p>Aujourd'hui, la Joconde est exposée au Louvre à Paris, derrière une vitre blindée. Elle attire près de dix millions de visiteurs chaque année. En 1911, elle a même été volée par un employé du musée — ce qui l'a rendue encore plus célèbre !</p>",
    questions:[
      { q:"Pourquoi le sourire de la Joconde est-il si mystérieux ?", opts:["Il a été peint avec de l'or","Son expression semble changer selon l'angle","Lisa refusait de sourire","Le tableau est trop petit pour le voir"], correct:1, expl:"Le texte explique que l'expression de Lisa semble changer selon l'angle depuis lequel on regarde le tableau.", fun:"La Joconde mesure seulement 77 × 53 cm — beaucoup plus petite que ce que les visiteurs imaginent !" },
      { q:"Qu'est-il arrivé à la Joconde en 1911 ?", opts:["Elle a brûlé dans un incendie","Elle a été vendue à un collectionneur","Elle a été volée par un employé du musée","Elle a été envoyée en Italie en cadeau"], correct:2, expl:"Le texte dit qu'elle 'a été volée par un employé du musée', ce qui l'a rendue encore plus célèbre.", fun:"Le voleur, Vincenzo Peruggia, a caché la Joconde sous son lit pendant deux ans avant d'être arrêté !" }
    ]

  {
    theme:"&#127912; Art",
    titre:"Frida Kahlo",
    wikiTerm:"Frida_Kahlo",
    passage:"<p>Frida Kahlo est l'une des artistes les plus connues du monde. Elle est née au Mexique en 1907. À 18 ans, elle a eu un grave accident de bus qui l'a obligée à rester au lit pendant de longs mois. Pour s'occuper, elle a commencé à peindre — ses parents avaient installé un miroir au-dessus de son lit pour qu'elle puisse se voir.</p><p>C'est ainsi qu'elle a commencé à faire des autoportraits, c'est-à-dire des tableaux où elle se représente elle-même. Elle en a peint 55 au total ! Ses tableaux sont très colorés et mélangent des éléments de la culture mexicaine : costumes traditionnels, animaux et symboles.</p><p>Frida Kahlo est devenue célèbre dans le monde entier seulement après sa mort en 1954. Aujourd'hui, ses tableaux se vendent à des prix records, et son visage est reconnu partout comme un symbole de courage et de créativité.</p>",
    questions:[

      { q:"Quand Frida Kahlo est-elle devenue célèbre dans le monde entier ?", opts:["Dès son premier tableau","Pendant son enfance","Seulement après sa mort en 1954","Grâce à internet"], correct:2, expl:"Le texte précise qu'elle 'est devenue célèbre dans le monde entier seulement après sa mort en 1954'.", fun:"En 2021, l'un de ses tableaux s'est vendu 34,9 millions de dollars — un record pour une artiste latino-américaine !" }

  {
    theme:"&#127758; G&#233;ographie",
    titre:"L'Amazonie",
    wikiTerm:"Amazon_rainforest",
    passage:"<p>L'Amazonie est la plus grande forêt du monde. Elle s'étend sur neuf pays d'Amérique du Sud, dont le Brésil qui en possède la plus grande partie. On l'appelle souvent le « poumon de la Terre » parce qu'elle produit une grande quantité d'oxygène et absorbe beaucoup de CO₂, le gaz responsable du réchauffement climatique.</p><p>Cette forêt est incroyablement riche en animaux et en plantes. On y trouve des milliers d'espèces de poissons, d'oiseaux et d'insectes. Certaines régions n'ont jamais été explorées par les scientifiques, et de nouvelles espèces sont découvertes chaque année.</p><p>Malheureusement, l'Amazonie est en danger. Des millions d'hectares de forêt sont détruits chaque année pour l'agriculture. Si cela continue, cette forêt extraordinaire pourrait disparaître, ce qui serait une catastrophe pour toute la planète.</p>",
    questions:[

      { q:"Quelle est la principale menace qui pèse sur l'Amazonie ?", opts:["Les tremblements de terre","La destruction de la forêt pour l'agriculture","Les inondations","Le tourisme de masse"], correct:1, expl:"Le texte indique que 'des millions d'hectares de forêt sont détruits chaque année pour l'agriculture'.", fun:"L'Amazonie abrite environ 400 peuples autochtones — certains n'ont jamais eu de contact avec le monde extérieur !" }

  {
    theme:"&#127758; G&#233;ographie",
    titre:"Le Japon",
    wikiTerm:"Mount_Fuji",
    passage:"<p>Le Japon est un pays formé de milliers d'îles dans l'océan Pacifique. C'est l'un des pays les plus peuplés du monde, avec Tokyo comme capitale — la ville la plus grande du monde avec plus de 37 millions d'habitants ! Le Japon est aussi l'une des économies les plus puissantes de la planète.</p><p>Le mont Fuji est le sommet le plus haut du Japon, avec 3 776 mètres. Ce volcan endormi est considéré comme sacré par les Japonais. Chaque été, des centaines de milliers de personnes tentent de l'escalader. Sa forme presque parfaite en fait l'un des paysages les plus photographiés du monde.</p><p>Le Japon est aussi l'un des pays les plus sismiques du monde : il subit environ 1 500 tremblements de terre par an ! Pour cette raison, les Japonais ont développé des techniques de construction très avancées pour résister aux séismes.</p>",
    questions:[

  {
    theme:"&#128220; Histoire",
    titre:"La Révolution française",
    wikiTerm:"French_Revolution",
    passage:"<p>La Révolution française a commencé en 1789 et a complètement changé la France. Avant, le roi Louis XVI avait tous les pouvoirs. Le peuple, lui, souffrait de la faim et de la pauvreté. En juillet 1789, les Parisiens se sont révoltés et ont pris d'assaut la prison de la Bastille, symbole de l'injustice royale. Cet événement est encore célébré chaque 14 juillet comme fête nationale.</p><p>La Révolution a apporté des idées nouvelles et importantes : la liberté, l'égalité et la fraternité. Ces trois mots sont encore aujourd'hui la devise de la France. Une nouvelle loi appelée la Déclaration des droits de l'homme a proclamé que tous les citoyens avaient les mêmes droits.</p><p>Mais la Révolution a aussi eu des moments très sombres. Pendant la période appelée la Terreur, des milliers de personnes ont été exécutées, dont le roi Louis XVI et la reine Marie-Antoinette.</p>",

      { q:"Quels sont les trois mots qui forment la devise de la France ?", opts:["Justice, Vérité, Courage","Liberté, Égalité, Fraternité","Honneur, Patrie, Progrès","Roi, Nation, Loi"], correct:1, expl:"Le texte mentionne que 'la liberté, l'égalité et la fraternité' sont 'encore aujourd'hui la devise de la France'.", fun:"La guillotine a été inventée pour rendre les exécutions moins douloureuses — son inventeur était en réalité contre la peine de mort !" }

  {
    theme:"&#128220; Histoire",
    titre:"Nelson Mandela",
    wikiTerm:"Nelson_Mandela",
    passage:"<p>Nelson Mandela est l'une des personnes les plus admirées de l'histoire. Il est né en 1918 en Afrique du Sud, un pays où les Noirs et les Blancs étaient séparés par une loi injuste appelée l'apartheid. Les Noirs n'avaient pas les mêmes droits : ils ne pouvaient pas aller dans les mêmes écoles, les mêmes restaurants ou les mêmes transports que les Blancs.</p><p>Mandela a lutté contre cette injustice toute sa vie. Pour cette raison, il a été mis en prison en 1964 et y a passé 27 ans. Pendant tout ce temps, il est resté courageux et calme, et des millions de personnes dans le monde entier demandaient sa libération.</p><p>Libéré en 1990, Mandela a choisi le dialogue plutôt que la vengeance. En 1994, il est devenu le premier président noir d'Afrique du Sud. Il a reçu le prix Nobel de la Paix en 1993.</p>",
    questions:[

      { q:"Quelle attitude Mandela a-t-il choisie après sa sortie de prison ?", opts:["Il a fui l'Afrique du Sud","Il a organisé une révolution armée","Il a choisi le dialogue plutôt que la vengeance","Il a demandé l'emprisonnement de ses ennemis"], correct:2, expl:"Le texte dit qu'après sa libération, Mandela 'a choisi le dialogue plutôt que la vengeance'.", fun:"Mandela a appris la langue de ses gardiens de prison pour mieux les comprendre et pouvoir dialoguer avec eux." }

  {
    theme:"&#127807; Nature",
    titre:"Les abeilles",
    wikiTerm:"Honeybee",
    passage:"<p>Les abeilles sont parmi les animaux les plus importants de la planète. Elles pollinisent les fleurs en transportant du pollen d'une plante à l'autre lorsqu'elles récoltent le nectar. Sans elles, beaucoup de fruits et légumes que nous mangeons — comme les pommes, les fraises et les amandes — ne pourraient plus pousser.</p><p>Une ruche abrite entre 50 000 et 80 000 abeilles, toutes organisées comme dans une usine. La reine pond jusqu'à 2 000 œufs par jour. Les ouvrières construisent les alvéoles en cire, nourrissent les larves et récoltent le nectar. Les mâles, eux, n'ont qu'un seul rôle : s'accoupler avec la reine.</p><p>Malheureusement, les abeilles sont en danger. Les pesticides, la destruction de leurs habitats et les maladies font diminuer leur nombre. Des scientifiques du monde entier cherchent des solutions pour les protéger, car sans elles, notre alimentation serait gravement menacée.</p>",
    questions:[

      { q:"Pourquoi les abeilles sont-elles si importantes pour notre alimentation ?", opts:["Elles produisent du miel très nutritif","Elles pollinisent les plantes dont viennent nos fruits et légumes","Elles nettoient les plantes des insectes nuisibles","Elles arrosent les plantes"], correct:1, expl:"Le texte explique que sans les abeilles, 'beaucoup de fruits et légumes que nous mangeons ne pourraient plus pousser'.", fun:"Il faut visiter environ deux millions de fleurs pour produire 500 grammes de miel !" }

  {
    theme:"&#127807; Nature",
    titre:"Les aurores boréales",
    wikiTerm:"Aurora",
    passage:"<p>Les aurores boréales sont l'un des spectacles naturels les plus beaux du monde. Ce sont des lumières colorées — souvent vertes, roses ou violettes — qui dansent dans le ciel des régions proches du pôle Nord. On peut les voir en Norvège, en Islande, en Finlande et au Canada.</p><p>Ce phénomène est causé par le Soleil. Le Soleil envoie des particules dans l'espace — c'est ce qu'on appelle le vent solaire. Quand ces particules arrivent près de la Terre, elles entrent dans l'atmosphère et entrent en collision avec des gaz comme l'oxygène. Cette collision produit de la lumière colorée. La couleur dépend du type de gaz et de l'altitude.</p><p>Les aurores suivent un cycle de onze ans lié à l'activité du Soleil. Quand le Soleil est très actif, les aurores sont plus fréquentes et plus intenses. Elles peuvent même être visibles depuis certaines régions du nord de la France !</p>",
    questions:[
      { q:"Qu'est-ce qui provoque les aurores boréales ?", opts:["Le reflet de la glace sur les nuages","Des particules du Soleil qui entrent en collision avec les gaz de l'atmosphère","Des éruptions de volcans arctiques","La lumière de la lune réfractée par le froid"], correct:1, expl:"Le texte explique que des particules du vent solaire 'entrent en collision avec des gaz comme l'oxygène', ce qui produit de la lumière colorée.", fun:"En mai 2024, une tempête solaire très puissante a rendu les aurores visibles jusqu'en Espagne et au Maroc !" },
      { q:"De quoi dépend la couleur des aurores boréales ?", opts:["De la saison et de la température","Du type de gaz et de l'altitude","De la force du vent","De la distance par rapport au pôle"], correct:1, expl:"Le texte précise que 'la couleur dépend du type de gaz et de l'altitude'.", fun:"L'oxygène produit des aurores vertes ou rouges, et l'azote produit des aurores bleues ou violettes !" }
    ]

  {
    theme:"&#128640; Science &amp; Espace",
    titre:"Apollo 11",
    wikiTerm:"Apollo_11",
    passage:"<p>En juillet 1969, deux astronautes américains, Neil Armstrong et Buzz Aldrin, sont devenus les premiers êtres humains à marcher sur la Lune. C'était la mission Apollo 11. En posant le pied sur le sol lunaire, Armstrong a prononcé une phrase célèbre : « C'est un petit pas pour l'homme, un bond de géant pour l'humanité. »</p><p>La surface de la Lune est très différente de la Terre. Il n'y a ni atmosphère, ni vent, ni eau. Les températures varient de -170°C la nuit à +130°C le jour ! Les astronautes portaient des combinaisons spéciales pour survivre. Et comme il n'y a pas de son sur la Lune, c'est un endroit complètement silencieux.</p><p>Un détail fascinant : les traces de pas laissées par Armstrong et Aldrin sont encore visibles aujourd'hui sur la Lune. Sans vent ni eau pour les effacer, elles seront conservées pendant des millions d'années !</p>",
    questions:[

      { q:"Quelle phrase célèbre Neil Armstrong a-t-il prononcée en marchant sur la Lune ?", opts:["Un grand jour pour la science !","C'est un petit pas pour l'homme, un bond de géant pour l'humanité","Nous sommes arrivés sur la Lune !","La Terre est bleue depuis ici"], correct:1, expl:"Le texte cite directement la phrase d'Armstrong : 'C'est un petit pas pour l'homme, un bond de géant pour l'humanité'.", fun:"La mission Apollo 11 a nécessité le travail de plus de 400 000 ingénieurs et scientifiques pendant 8 ans !" }
    ]

  {
    theme:"&#128640; Science &amp; Espace",
    titre:"Les trous noirs",
    wikiTerm:"Black_hole",
    passage:"<p>Un trou noir est une région de l'espace où la gravité est tellement forte que rien ne peut s'en échapper — pas même la lumière ! C'est pour ça qu'on ne peut pas les voir directement. Les trous noirs se forment quand une très grosse étoile meurt en explosant.</p><p>En 2019, des scientifiques ont réussi pour la première fois à prendre une photo d'un trou noir. Pour y arriver, ils ont utilisé un réseau de télescopes installés tout autour de la Terre. L'image montre un anneau de lumière brillante autour d'une zone sombre centrale.</p><p>Il existe un trou noir géant au centre de notre galaxie, la Voie Lactée. Il s'appelle Sagittarius A* et sa masse est égale à quatre millions de fois celle du Soleil. Mais ne t'inquiète pas — il est situé à 26 000 années-lumière de la Terre, très loin de nous !</p>",
    questions:[
      { q:"Pourquoi ne peut-on pas voir un trou noir directement ?", opts:["Parce qu'ils sont trop petits","Parce qu'ils se déplacent trop vite","Parce que même la lumière ne peut pas s'en échapper","Parce qu'ils sont derrière des planètes"], correct:2, expl:"Le texte explique que 'la gravité est tellement forte que rien ne peut s'en échapper — pas même la lumière'.", fun:"Si tu tombais dans un trou noir, les gens qui te regarderaient de loin te verraient ralentir et ne jamais vraiment disparaître — un effet prédit par Albert Einstein !" },
      { q:"Comment les scientifiques ont-ils réussi à photographier un trou noir en 2019 ?", opts:["Avec un seul très grand télescope spatial","En envoyant une sonde près d'un trou noir","Grâce à un réseau de télescopes installés autour de la Terre","En utilisant des rayons X spéciaux"], correct:2, expl:"Le texte précise qu'ils 'ont utilisé un réseau de télescopes installés tout autour de la Terre'.", fun:"Les données de cette photo pesaient si lourd qu'elles ne pouvaient pas être envoyées par internet — elles ont voyagé en avion sur des disques durs !" }
    ]

  {
    theme:"&#127981; Civilisations anciennes",
    titre:"L'Égypte ancienne",
    wikiTerm:"Ancient_Egypt",
    passage:"<p>L'Égypte ancienne est l'une des civilisations les plus fascinantes de l'histoire. Pendant plus de 3 000 ans, elle a prospéré le long du fleuve Nil. Les Égyptiens croyaient en la vie après la mort, et ils momifiaient les corps des morts pour les préserver pour ce voyage.</p><p>Les pyramides sont les monuments les plus impressionnants de l'Égypte ancienne. La Grande Pyramide de Gizeh a été construite pour le pharaon Khéops. Elle est composée de 2,3 millions de blocs de pierre ! Pendant 3 800 ans, elle a été la construction la plus haute du monde. Ce n'étaient pas des esclaves qui la construisaient, mais des ouvriers payés.</p><p>L'écriture des Égyptiens s'appelait les hiéroglyphes. Pendant longtemps, personne ne savait les lire. C'est grâce à la Pierre de Rosette, découverte en 1799, qu'un Français appelé Champollion a pu déchiffrer ce mystère en 1822.</p>",
    questions:[
      { q:"Qui a construit les pyramides, selon le texte ?", opts:["Des esclaves venus d'autres pays","Des soldats de l'armée du pharaon","Des ouvriers payés","Des prisonniers de guerre"], correct:2, expl:"Le texte précise clairement que 'ce n'étaient pas des esclaves qui la construisaient, mais des ouvriers payés'.", fun:"Les ouvriers qui construisaient les pyramides recevaient de la bière comme partie de leur salaire — environ 4 litres par jour !" },
      { q:"Grâce à quoi a-t-on pu déchiffrer les hiéroglyphes ?", opts:["Un dictionnaire ancien trouvé à Alexandrie","La Pierre de Rosette découverte en 1799","Des dessins trouvés dans une tombe","L'aide de prêtres égyptiens"], correct:1, expl:"Le texte dit que 'c'est grâce à la Pierre de Rosette, découverte en 1799' que Champollion a pu déchiffrer les hiéroglyphes.", fun:"Champollion était si ému d'avoir déchiffré les hiéroglyphes qu'il s'est évanoui dans son bureau avant de pouvoir l'annoncer à ses collègues !" }
    ]
  },
  {
    theme:"&#127981; Civilisations anciennes",
    titre:"Les Mayas",
    wikiTerm:"Maya_civilization",
    passage:"<p>Les Mayas ont développé une civilisation très avancée en Amérique centrale, il y a plus de 2 000 ans. Leurs grandes villes comme Tikal et Chichen Itza avaient des pyramides imposantes, des marchés animés et des systèmes d'irrigation pour les cultures.</p><p>Les Mayas étaient très forts en mathématiques et en astronomie. Ils avaient inventé le concept du zéro avant l'Europe ! Ils avaient aussi créé un calendrier très précis, basé sur leurs observations du Soleil et de la Lune. Leur écriture, faite de petits dessins appelés glyphes, leur permettait de noter leur histoire et leurs connaissances.</p><p>Vers l'an 900 après Jésus-Christ, leur civilisation a connu un grand déclin. Les raisons restent mystérieuses : peut-être des sécheresses, des guerres ou la destruction de la nature. Mais les Mayas n'ont pas disparu ! Aujourd'hui, environ six millions de personnes descendent des anciens Mayas.</p>",
    questions:[
      { q:"Quelle invention mathématique importante les Mayas avaient-ils faite avant l'Europe ?", opts:["Le système décimal","La géométrie","Le concept du zéro","La multiplication"], correct:2, expl:"Le texte dit que les Mayas 'avaient inventé le concept du zéro avant l'Europe'.", fun:"Le calendrier maya était si précis qu'il ne se décalait que d'une seconde par rapport au calendrier solaire au bout de 6 000 ans !" },
      { q:"Les Mayas ont-ils complètement disparu ?", opts:["Oui, ils ont tous péri lors du déclin","Oui, les Espagnols les ont éliminés","Non, environ six millions de personnes en descendent aujourd'hui","Non, mais ils ont perdu toutes leurs traditions"], correct:2, expl:"Le texte précise que 'les Mayas n'ont pas disparu' et qu'environ six millions de personnes descendent des anciens Mayas.", fun:"Vingt-et-une langues mayas différentes sont encore parlées aujourd'hui au Mexique et en Amérique centrale !" }
    ]
  },
  {
    theme:"&#129504; Psychologie",
    titre:"Le sommeil",
    wikiTerm:"Sleep",
    passage:"<p>Le sommeil est beaucoup plus important que tu ne le penses ! Quand tu dors, ton cerveau ne se repose pas — il travaille. Il range les souvenirs de ta journée, élimine les déchets accumulés entre les cellules et libère des hormones qui t'aident à grandir. C'est pour ça que les enfants et les adolescents ont particulièrement besoin de dormir.</p><p>Pendant la nuit, tu passes par plusieurs phases de sommeil. La phase la plus intéressante est le sommeil paradoxal : c'est le moment où tu rêves le plus. Ton cerveau est aussi actif qu'en plein jour, mais tes muscles sont paralysés — pour t'éviter d'agir tes rêves dans la réalité !</p><p>Les scientifiques recommandent 8 à 10 heures de sommeil par nuit pour les ados. Un manque de sommeil affecte la concentration et la mémoire. Les écrans le soir perturbent le sommeil car leur lumière trompe le cerveau.</p>",

  {

    titre:"Les émotions",
    wikiTerm:"Emotion",
    passage:"<p>Les émotions jouent un rôle très important dans notre vie. Elles nous aident à prendre des décisions, à communiquer avec les autres et à réagir face aux situations. Des scientifiques ont découvert que des personnes qui ne ressentaient plus d'émotions avaient du mal à faire les choses les plus simples — comme choisir entre deux restaurants !</p><p>Nos émotions s'expriment aussi dans notre corps. La peur accélère le cœur et tend les muscles — une réaction héritée de nos ancêtres qui devaient fuir les prédateurs. La joie libère une substance dans le cerveau appelée dopamine, qui nous donne envie de répéter ce qui nous rend heureux.</p><p>Les psychologues ont identifié six émotions que tous les humains partagent, quelle que soit leur culture : la joie, la tristesse, la peur, la colère, le dégoût et la surprise. Ces émotions s'expriment de la même façon sur le visage, partout dans le monde.</p>",

  {

    titre:"Les océans",
    wikiTerm:"Ocean",
    passage:"<p>Les océans couvrent 71% de la surface de la Terre et contiennent 97% de toute l'eau de la planète. Pourtant, on en a exploré moins de 20% ! Les parties les plus profondes restent plus mystérieuses que la surface de la Lune. La zone la plus profonde connue est la fosse des Mariannes, dans le Pacifique, qui atteint plus de 11 000 mètres de profondeur.</p><p>Dans les grandes profondeurs, il fait complètement noir et la pression est énorme. Pourtant, des centaines d'animaux y vivent ! Beaucoup d'entre eux produisent leur propre lumière, grâce à un phénomène appelé bioluminescence. C'est comme s'ils avaient leur propre lampe intégrée !</p><p>Les océans jouent un rôle crucial pour la planète. Ils absorbent une grande partie du CO₂ que nous produisons et régulent le climat. Mais la pollution et le réchauffement climatique les menacent gravement, ce qui met en danger tous les animaux qui y vivent.</p>",

  {

    wikiTerm:"Coral_reef",
    passage:"<p>Les récifs coralliens sont parfois appelés les « forêts tropicales de la mer ». Ils ne couvrent qu'une toute petite partie du fond des océans, mais ils abritent environ 25% de toutes les espèces marines connues ! La Grande Barrière de Corail, en Australie, est le plus grand organisme vivant de la planète.</p><p>Contrairement à ce qu'on pourrait croire, les coraux ne sont pas des plantes mais des animaux ! Chaque corail est un petit animal qui sécrète un squelette dur. Les coraux vivent avec de minuscules algues qui leur donnent leurs belles couleurs et leur fournissent de la nourriture grâce à la lumière du soleil.</p><p>Quand la température de l'eau monte trop, les coraux expulsent leurs algues et deviennent blancs — c'est ce qu'on appelle le blanchissement des coraux. Sans leurs algues, ils meurent lentement. On estime que 50% des coraux du monde ont déjà disparu depuis les années 1950.</p>",

    theme:"&#127916; Cin&#233;ma &amp; Musique",
    titre:"Le cinéma",
    wikiTerm:"Film",
    passage:"<p>Le cinéma est né officiellement le 28 décembre 1895, quand les frères Lumière ont organisé la première projection payante à Paris. Les premières images filmées montraient des scènes simples de la vie quotidienne. Le public était stupéfait — certains auraient même fui la salle en voyant un train arriver à l'écran, croyant qu'il allait les écraser !</p><p>Au début, les films étaient muets et en noir et blanc. Le premier film avec du son est sorti en 1927 aux États-Unis. La couleur est devenue courante dans les années 1950. Aujourd'hui, les effets spéciaux numériques permettent de créer des mondes complètement imaginaires à l'écran.</p><p>Le cinéma est devenu l'un des arts les plus populaires du monde. Hollywood est la capitale mondiale du cinéma, mais l'Inde produit en réalité plus de films chaque année ! Les plateformes de streaming ont aussi révolutionné notre façon de regarder des films.</p>",

    titre:"Beethoven",
    wikiTerm:"Beethoven",
    passage:"<p>Ludwig van Beethoven est l'un des plus grands compositeurs de l'histoire de la musique. Né en Allemagne en 1770, il a montré un talent exceptionnel dès son plus jeune âge. Il est parti vivre à Vienne, la capitale de la musique de l'époque, où il est rapidement devenu très célèbre.</p><p>Ce qui rend son histoire incroyable, c'est qu'à partir de 27 ans, Beethoven a commencé à perdre l'ouïe progressivement. À 44 ans, il était complètement sourd. Pourtant, c'est pendant cette période qu'il a composé certaines de ses œuvres les plus célèbres, dont la magnifique Neuvième Symphonie. Il « entendait » la musique dans sa tête !</p><p>Lors de la première représentation de la Neuvième Symphonie en 1824, Beethoven dirigeait l'orchestre sur scène. À la fin, sourd, il ne s'est pas retourné pour saluer. C'est une musicienne qui l'a tourné vers la salle — et il a découvert le public debout, en délire.</p>",

    wikiTerm:"Usain_Bolt",
    passage:"<p>Usain Bolt est l'homme le plus rapide de l'histoire. Ce sprinter jamaïcain a établi le record du monde du 100 mètres en 9 secondes 58 en 2009, à Berlin. À cette vitesse, il courait à plus de 37 km/h — presque aussi vite qu'un vélo en pleine descente !</p><p>Ce qui est surprenant, c'est qu'Usain Bolt mesure 1,96 mètre, ce qui est très grand pour un sprinteur. En général, les grands athlètes ont du mal à accélérer rapidement. Mais Bolt avait une foulée tellement longue qu'il n'avait besoin que de 41 pas pour parcourir 100 mètres, contre 45 à 48 pour ses adversaires.</p><p>Bolt a dominé le sprint mondial pendant plus de dix ans. Il a remporté huit médailles d'or aux Jeux Olympiques de 2008, 2012 et 2016. Il a pris sa retraite sportive en 2017. Depuis lors, personne n'est parvenu à battre ses records.</p>",

    titre:"L'escalade",
    wikiTerm:"Rock_climbing",
    passage:"<p>L'escalade est l'un des sports qui grandit le plus vite dans le monde. Elle est devenue un sport olympique aux Jeux de Tokyo en 2021 et a attiré des millions de nouveaux pratiquants. La discipline olympique combine trois épreuves : la vitesse, le bloc et la difficulté.</p><p>En dehors des salles, des grimpeurs extraordinaires s'attaquent aux grandes parois rocheuses naturelles. En 2017, Alex Honnold a réalisé l'un des exploits les plus incroyables de l'histoire du sport : il a grimpé seul et sans corde une paroi de 900 mètres en Californie, appelée El Capitan. La moindre erreur aurait été fatale. Il l'a escaladée en moins de 4 heures !</p><p>Ce qui est fascinant dans l'escalade, c'est que la force physique ne suffit pas. Il faut aussi réfléchir : analyser la paroi, planifier ses mouvements et trouver où se reposer. C'est comme résoudre un puzzle avec son corps !</p>",

    passage:"<p>Vincent van Gogh est l'un des peintres les plus célèbres du monde, mais il n'a vendu qu'un seul tableau de son vivant ! Cet artiste néerlandais a peint plus de 900 tableaux en seulement dix ans. Ses œuvres les plus connues sont <em>La Nuit étoilée</em> et ses séries de tournesols.</p><p>Ce qui rend les tableaux de Van Gogh si reconnaissables, c'est sa façon de peindre : il utilisait de très épaisses couches de peinture et des coups de pinceau tourbillonnants qui donnent l'impression que tout est en mouvement. Cette technique s'appelle l'empâtement.</p><p>Van Gogh a eu une vie très difficile. Il souffrait de problèmes de santé mentale et a passé du temps dans un hôpital psychiatrique. C'est là qu'il a peint <em>La Nuit étoilée</em>. Après sa mort en 1890, sa sœur a tout fait pour que son travail soit reconnu — et aujourd'hui ses tableaux valent des centaines de millions de dollars !</p>",

    titre:"L'Afrique",
    wikiTerm:"Africa",
    passage:"<p>L'Afrique est le deuxième plus grand continent du monde, après l'Asie. Elle est immense : on pourrait y faire tenir les États-Unis, l'Europe, la Chine et l'Inde en même temps ! Elle est composée de 54 pays et abrite plus de 1,4 milliard d'habitants, ce qui en fait le continent le plus peuplé après l'Asie.</p><p>L'Afrique est incroyablement diverse. On y trouve des déserts comme le Sahara — le plus grand désert chaud du monde — mais aussi des forêts tropicales, des savanes, des montagnes enneigées et même des plages magnifiques. Le Nil, qui traverse l'Égypte, est le plus long fleuve du monde.</p><p>L'Afrique est aussi le berceau de l'humanité : les scientifiques pensent que les premiers êtres humains sont apparus sur ce continent il y a environ 300 000 ans. Aujourd'hui, l'Afrique est le continent qui grandit le plus vite, avec une population très jeune et des économies en pleine croissance.</p>",

    titre:"Les Jeux Olympiques antiques",
    wikiTerm:"Ancient_Olympic_Games",
    passage:"<p>Les Jeux Olympiques ont été inventés il y a près de 3 000 ans, dans la Grèce antique. Ils se déroulaient tous les quatre ans dans la ville d'Olympie, en l'honneur du dieu Zeus. Pendant les Jeux, toutes les guerres entre les cités grecques s'arrêtaient — on appelait ça la Trêve Olympique.</p><p>Les épreuves étaient très différentes des Jeux modernes. Les athlètes participaient à la course à pied, au lancer de disque, à la lutte et à la course de chars tirés par des chevaux. Il n'y avait pas de médailles : les vainqueurs recevaient une simple couronne de feuilles d'olivier, mais ils étaient célébrés comme des héros dans toute la Grèce.</p><p>Les Jeux Olympiques antiques ont duré plus de 1 000 ans, jusqu'en 393 après Jésus-Christ, quand l'empereur romain Théodose les a interdits. Ce sont les Jeux modernes qui ont été relancés en 1896 à Athènes, grâce au baron Pierre de Coubertin.</p>",

    titre:"Les requins",
    wikiTerm:"Shark",
    passage:"<p>Les requins existent sur Terre depuis environ 450 millions d'années — bien avant les dinosaures ! Ils ont survécu à cinq grandes extinctions massives. On en compte plus de 500 espèces différentes, du minuscule requin nain de 20 cm au gigantesque requin baleine qui peut atteindre 12 mètres.</p><p>Contrairement à leur réputation dans les films, les requins attaquent très rarement les humains. En moyenne, moins de dix personnes par an meurent d'une attaque de requin dans le monde. En revanche, les humains tuent environ 100 millions de requins chaque année, principalement pour leurs ailerons.</p><p>Les requins jouent un rôle crucial dans l'équilibre des océans. En tant que prédateurs au sommet de la chaîne alimentaire, ils régulent les populations d'autres poissons. Sans eux, les écosystèmes marins seraient gravement perturbés. Malheureusement, beaucoup d'espèces de requins sont aujourd'hui menacées d'extinction.</p>",

    passage:"<p>La Lune est le seul satellite naturel de la Terre. Elle se trouve à environ 384 000 kilomètres de nous — ce qui peut paraître très loin, mais c'est la chose la plus proche de nous dans l'espace ! La Lune tourne autour de la Terre en 27 jours, et elle tourne aussi sur elle-même en exactement le même temps. C'est pourquoi on voit toujours la même face de la Lune depuis la Terre.</p><p>La Lune a une influence très importante sur notre planète. C'est elle qui provoque les marées dans les océans, grâce à la force de gravité qu'elle exerce sur l'eau. Sans la Lune, la Terre oscilierait de façon incontrôlée sur son axe, ce qui rendrait le climat beaucoup plus instable.</p><p>La Lune n'a ni atmosphère ni eau liquide. Sa surface est couverte de cratères formés par des météorites. La température y varie de -170°C la nuit à +130°C le jour. Douze astronautes américains ont marché sur la Lune entre 1969 et 1972, lors des missions Apollo.</p>",

    titre:"La Rome antique",
    wikiTerm:"Ancient_Rome",
    passage:"<p>La Rome antique était l'une des civilisations les plus puissantes de l'histoire. À son apogée, l'Empire romain contrôlait un territoire immense, de l'Angleterre jusqu'à la Mésopotamie. Rome était gouvernée d'abord par des rois, puis par une République, et enfin par des empereurs.</p><p>Les Romains ont apporté de nombreuses inventions qui influencent encore notre vie aujourd'hui. Ils ont construit des routes droites qui traversaient tout l'empire — certaines existent encore ! Ils ont inventé le béton, les aqueducs pour transporter l'eau, et ont développé un système de lois dont beaucoup de pays s'inspirent encore.</p><p>La langue des Romains s'appelait le latin. Beaucoup de langues modernes en descendent : le français, l'espagnol, l'italien, le portugais et le roumain sont toutes des langues latines. Même en anglais, la moitié des mots viennent du latin. L'Empire romain a fini par s'effondrer en 476 après Jésus-Christ, mais son héritage est encore partout autour de nous.</p>",

    titre:"La mémoire",
    wikiTerm:"Memory",
    passage:"<p>La mémoire est la capacité du cerveau à enregistrer, conserver et retrouver des informations. Sans elle, tu ne pourrais pas reconnaître le visage de tes amis, te souvenir de ce que tu as appris à l'école, ou même savoir comment faire du vélo !</p><p>Il existe plusieurs types de mémoire. La mémoire à court terme peut stocker environ 7 éléments à la fois pendant quelques secondes — c'est ce qui te permet de retenir un numéro de téléphone le temps de le composer. La mémoire à long terme, elle, peut stocker des informations pendant des années, voire toute une vie.</p><p>Pour mémoriser quelque chose efficacement, il ne suffit pas de le lire une fois. Les scientifiques ont découvert que répéter l'information à intervalles réguliers — une technique appelée la répétition espacée — est bien plus efficace. Dormir est aussi crucial : c'est pendant le sommeil que le cerveau consolide les souvenirs de la journée.</p>",

    passage:"<p>Les dauphins sont des mammifères marins extraordinairement intelligents. Ils vivent en groupes appelés pods et communiquent entre eux grâce à un système complexe de clics et de sifflements — chaque dauphin a même son propre sifflement unique qui lui sert de 'nom' !</p><p>Les dauphins utilisent l'écholocation pour se repérer et chasser : ils émettent des sons qui rebondissent sur les objets et les poissons, ce qui leur permet de 'voir' même dans une eau trouble ou dans l'obscurité. Ils peuvent aussi nager à plus de 50 km/h et sauter jusqu'à 6 mètres hors de l'eau.</p><p>Les dauphins ont montré des comportements très complexes : ils utilisent des éponges marines comme outils pour chercher de la nourriture, ils jouent, ils semblent ressentir de la tristesse quand ils perdent un membre de leur groupe. Certains scientifiques pensent qu'ils ont une forme de conscience et de culture, transmise de génération en génération.</p>",

    titre:"Le hip-hop",
    wikiTerm:"Hip_hop_music",
    passage:"<p>Le hip-hop est né dans le Bronx, un quartier de New York, au début des années 1970. À l'époque, c'était un quartier pauvre, et les jeunes ont créé une nouvelle forme de musique avec les moyens du bord : des platines vinyle, des micros et leur voix. DJ Kool Herc est souvent considéré comme le père fondateur du hip-hop.</p><p>Le hip-hop ne se résume pas qu'à la musique : c'est toute une culture. Elle comprend le rap (chanter des paroles rythmées), le DJing (mixer des disques), le breakdance (une forme de danse acrobatique) et le graffiti (un art urbain visuel). Ces quatre éléments forment les piliers du hip-hop.</p><p>Aujourd'hui, le hip-hop est le genre musical le plus écouté dans le monde. Des artistes comme Kendrick Lamar, Drake ou Stromae ont porté cette musique sur tous les continents. En France, des rappeurs comme IAM, NTM ou MC Solaar ont créé un hip-hop français unique, mêlant les influences américaines à la culture et à la langue françaises.</p>",

    passage:"<p>Les Jeux Paralympiques sont les Jeux Olympiques des athlètes en situation de handicap. Ils ont lieu quelques semaines après les Jeux Olympiques, dans la même ville et souvent dans les mêmes stades. Le mot 'paralympique' vient du grec 'para', qui signifie 'à côté de' — les Jeux Paralympiques sont donc les Jeux 'à côté des Olympiques'.</p><p>Les premiers Jeux Paralympiques modernes ont eu lieu en 1960 à Rome, avec 400 athlètes venus de 23 pays. Aujourd'hui, ils réunissent plus de 4 000 athlètes de 160 pays. Les sports proposés sont nombreux : basketball en fauteuil roulant, natation, athlétisme, escrime, tir à l'arc et bien d'autres.</p><p>Les performances des athlètes paralympiques sont impressionnantes. Certains sprinteurs amputés courent le 100 mètres en moins de 11 secondes. Des nageurs sans bras réalisent des chronos que peu de nageurs valides pourraient égaler. Ces athlètes montrent que le handicap n'empêche pas l'excellence sportive.</p>",

// ═══════════════════════════════════════════════════════════════════
//  LOCALSTORAGE SAVE/LOAD
// ═══════════════════════════════════════════════════════════════════
const SAVE_KEY = 'francais_aventure_v1';

function saveState() {
  try {
    localStorage.setItem(SAVE_KEY, JSON.stringify({
      score, xp, streak,
      usedTexts, textQIdx, currentTextIdx, textProgress,
      usedGrammaire, usedConjugaison,
      currentMode, answerLog, selectedLevel
    }));
    document.getElementById('saveStatus').textContent = 'sauvegardé ✓';
  } catch(e) {}
}

function loadState() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) { document.getElementById('saveStatus').textContent = 'nouvelle session'; return; }
    const s = JSON.parse(raw);
    score = s.score || 0;
    xp = s.xp || 0;
    streak = s.streak || 0;
    usedTexts = s.usedTexts || [];
    textQIdx = s.textQIdx !== undefined ? s.textQIdx : -1;
    currentTextIdx = s.currentTextIdx !== undefined ? s.currentTextIdx : -1;
    textProgress = s.textProgress || {};
    usedGrammaire = s.usedGrammaire || [];
    usedConjugaison = s.usedConjugaison || [];
    currentMode = s.currentMode || 'lecture';
    answerLog = s.answerLog || [];
    selectedLevel = s.selectedLevel || 0;
    document.getElementById('saveStatus').textContent = 'reprise de ta session ✓';
    updateScore(); updateStreak();
  } catch(e) {
    document.getElementById('saveStatus').textContent = 'nouvelle session';
  }
}

function confirmReset() {
  if (confirm('Remettre le score à zéro et recommencer depuis le début ?')) {
    localStorage.removeItem(SAVE_KEY);
    score = 0; xp = 0; streak = 0;
    usedTexts = []; textQIdx = -1; currentTextIdx = -1;
    textProgress = {};
    usedGrammaire = []; usedConjugaison = [];
    answerLog = [];
    currentMode = 'lecture';
    document.querySelectorAll('.mode-tab').forEach((t,i) => { t.classList.toggle('active', i===0); });
    updateScore(); updateStreak();
    document.getElementById('saveStatus').textContent = 'remise à zéro ✓';
    loadQuestion();
  }
}
