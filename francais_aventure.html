function renderSimple(q, num, total, mode) {
  const badges = { grammaire:'badge-grammaire', conjugaison:'badge-conjugaison' };
  const labels = { grammaire:'&#128292; Grammaire', conjugaison:'&#9881;&#65039; Conjugaison' };
  const niveauLabel = ['','FACILE','MOYEN','DIFFICILE'];
  const niveauClass = ['','niveau-1','niveau-2','niveau-3'];
  const niv = q.niveau || 1;
  const L = ['A','B','C','D'];

  let html = '<div class="card-top">'
    + '<span class="card-badge ' + badges[mode] + '">' + labels[mode] + '</span>'
    + '<span class="niveau-badge ' + niveauClass[niv] + '">' + niveauLabel[niv] + '</span>'
    + '<span class="q-counter">' + num + ' / ' + total + '</span>'
    + '</div>';

  if (q.temps) {
    html += '<div style="margin-bottom:12px;">'
      + '<span class="pill">&#128197; ' + q.temps + '</span>'
      + '<span class="pill pink">&#128292; ' + q.verbe_infinitif + '</span>'
      + '<span class="pill yellow">&#128100; ' + q.sujet + '</span>'
      + '</div>';
  }
  if (q.consigne) html += '<div style="color:#a8a4c8;font-size:0.88rem;margin-bottom:9px;">&#128204; ' + q.consigne + '</div>';

  if (q.options) {
    if (q.phrase && q.phrase.trim()) html += '<div class="passage" style="border-left-color:#feca57"><p>' + q.phrase + '</p></div>';
    html += '<div class="question-text">' + q.question + '</div>';
    html += '<div class="options" id="opts">';
    q.options.forEach((opt, i) => {
      html += '<button class="option-btn" onclick="checkQCM(this,' + i + ',' + q.correct + ')">'
        + '<span class="option-letter">' + L[i] + '</span>' + opt + '</button>';
    });
    html += '</div>';
  } else {
    const ctx = (q.contexte||'').replace('___','<strong style="color:#feca57;letter-spacing:2px">_ _ _</strong>');
    html += '<div class="question-text">Conjugue <strong style="color:#48dbfb">' + q.verbe_infinitif
      + '</strong> au <strong style="color:#ff9ff3">' + q.temps
      + '</strong> avec <strong style="color:#feca57">' + q.sujet + '</strong> :</div>';
    html += '<div class="passage" style="border-left-color:#48dbfb"><p>' + ctx + '</p></div>';
    html += '<div class="blank-wrap">'
      + '<input class="blank-input" id="blankInput" type="text" placeholder="' + q.hint + '" '
      + 'onkeydown="if(event.key===\'Enter\')checkBlank()" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">'
      + '<button class="btn btn-primary" onclick="checkBlank()">&#10003; V&#233;rifier</button></div>';
  }

  html += '<div id="feedback"></div>';
  // "En savoir plus" accordion — hidden until answered
  if (q.plus_loin) {
    html += '<div class="plus-loin-wrap" id="plusLoinWrap" style="display:none">'
      + '<button class="plus-loin-toggle" onclick="togglePlusLoin(this)" id="plusLoinBtn">'
      + '<span class="arrow">&#9654;</span> &#128218; En savoir plus sur cette règle</button>'
      + '<div class="plus-loin-body" id="plusLoinBody">' + q.plus_loin + '</div>'
      + '</div>';
  }
  html += '<div class="actions" id="actions" style="display:none">'
    + '<button class="btn btn-primary" onclick="loadQuestion()">&#10145;&#65039; Question suivante</button></div>';

  document.getElementById('mainCard').innerHTML = html;
  if (!q.options) setTimeout(() => { const i=document.getElementById('blankInput'); if(i) i.focus(); }, 80);
}

function togglePlusLoin(btn) {
  btn.classList.toggle('open');
  document.getElementById('plusLoinBody').classList.toggle('open');
}

// ═══════════════════════════════════════════════════════════════════
//  CHECK
// ═══════════════════════════════════════════════════════════════════
function checkQCM(btn, chosen, correct) {
  if (answered) return;
  answered = true;
  document.querySelectorAll('.option-btn').forEach((b,i) => {
    b.disabled = true;
    if (i===correct) b.classList.add('correct');
    if (i===chosen && chosen!==correct) b.classList.add('wrong');
  });
  const ok = chosen === correct;
  if (currentQ._mode === 'lecture') {
    dotResults.push(ok);
    textProgress[currentTextIdx] = dotResults.slice();
    renderSidebar();
  }
  // build log entry
  const opts = currentQ.opts || currentQ.options || [];
  logAnswer({
    mode: currentQ._mode,
    theme: currentQ._theme || '',
    question: currentQ.q || currentQ.question || '',
    given: opts[chosen] || String(chosen),
    correctAns: opts[correct] || String(correct),
    ok
  });
  showFeedback(ok);
}

function checkBlank() {
  if (answered) return;
  const inp = document.getElementById('blankInput');
  if (!inp) return;
  const val = inp.value.trim().toLowerCase();
  const accepted = (currentQ.reponses_acceptees||[currentQ.reponse]).map(a=>(a||'').toLowerCase());
  const ok = accepted.includes(val);
  inp.disabled = true;
  inp.classList.add(ok ? 'correct' : 'wrong');
  if (!ok) {
    const hint = document.createElement('span');
    hint.style.cssText = 'color:#1dd1a1;font-weight:800;font-size:1rem;';
    hint.textContent = '→ ' + (currentQ.reponse||'');
    inp.parentElement.appendChild(hint);
  }
  answered = true;
  logAnswer({
    mode: currentQ._mode,
    theme: currentQ._theme || '',
    question: (currentQ.verbe_infinitif||'') + ' — ' + (currentQ.sujet||'') + ' (' + (currentQ.temps||'') + ')',
    given: inp.value.trim() || '(vide)',
    correctAns: currentQ.reponse || '',
    ok
  });
  showFeedback(ok);
}

function showFeedback(ok) {
  const q = currentQ;
  const fb = document.getElementById('feedback');
  const acts = document.getElementById('actions');
  if (ok) {
    streak++;
    const pts = 10 + (streak > 2 ? 5 : 0);
    score += pts; xp += pts;
    updateScore(); updateStreak();
    const expl = q.expl || q.explication || '';
    const fun = q.fun_fact || q.fun || '';
    const tip = q.astuce || '';
    let msg = '<strong>&#9989; Bravo' + (streak > 2 ? ' &#128293; S&#233;rie x' + streak + '!' : ' !') + ' +' + pts + ' pts</strong>';
    msg += '<div class="expl">' + expl + '</div>';
    if (fun) msg += '<div class="tip">&#127881; <strong>Le savais-tu ?</strong> ' + fun + '</div>';
    if (tip) msg += '<div class="tip">&#128161; <strong>Astuce :</strong> ' + tip + '</div>';
    if (q.groupe) msg += '<div style="color:#a8a4c8;font-size:0.8rem;margin-top:5px;">(' + q.groupe + ')</div>';
    fb.className = 'feedback success'; fb.innerHTML = msg;
  } else {
    streak = 0; updateStreak();
    const expl = q.expl || q.explication || '';
    const tip = q.astuce || '';
    let msg = '<strong>&#10060; Pas tout &#224; fait !</strong>';
    msg += '<div class="expl">' + expl + '</div>';
    if (tip) msg += '<div class="tip">&#128161; <strong>Astuce :</strong> ' + tip + '</div>';
    if (q.groupe) msg += '<div style="color:#a8a4c8;font-size:0.8rem;margin-top:5px;">(' + q.groupe + ')</div>';
    fb.className = 'feedback fail'; fb.innerHTML = msg;
  }
  acts.style.display = 'flex';
  // reveal "En savoir plus" for grammaire/conjugaison
  const plw = document.getElementById('plusLoinWrap');
  if (plw) plw.style.display = 'block';
  saveState();
}

// ═══════════════════════════════════════════════════════════════════
//  ANSWER LOG
// ═══════════════════════════════════════════════════════════════════
function logAnswer({ mode, theme, question, given, correctAns, ok }) {
  answerLog.push({ ts: Date.now(), mode, theme, question, given, correctAns, ok });
}

function fmtDate(ts) {
  const d = new Date(ts);
  return d.toLocaleDateString('fr-FR', { day:'2-digit', month:'2-digit', year:'numeric' })
    + ' ' + d.toLocaleTimeString('fr-FR', { hour:'2-digit', minute:'2-digit' });
}

function showProgress() {
  // switch active tab
  document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tabProgress').classList.add('active');

  const total = answerLog.length;
  const correct = answerLog.filter(e => e.ok).length;
  const wrong = total - correct;
  const pct = total ? Math.round(correct / total * 100) : 0;

  const byMode = { lecture:[], grammaire:[], conjugaison:[] };
  answerLog.forEach(e => { if (byMode[e.mode]) byMode[e.mode].push(e); });

  const modeLabels = { lecture:'📖 Compréhension', grammaire:'🔤 Grammaire', conjugaison:'⚙️ Conjugaison' };

  let html = '<div class="prog-header">'
    + '<span class="prog-title">&#128202; Mon Progrès</span>'
    + '<button class="export-btn" onclick="exportCSV()">&#128229; Exporter CSV</button>'
    + '</div>';

  // stats
  html += '<div class="stat-row">'
    + '<div class="stat-box"><div class="stat-num blue">' + total + '</div><div class="stat-lbl">Questions</div></div>'
    + '<div class="stat-box"><div class="stat-num green">' + correct + '</div><div class="stat-lbl">Correctes</div></div>'
    + '<div class="stat-box"><div class="stat-num red">' + wrong + '</div><div class="stat-lbl">Erreurs</div></div>'
    + '<div class="stat-box"><div class="stat-num yellow">' + pct + '%</div><div class="stat-lbl">Réussite</div></div>'
    + '</div>';

  if (total === 0) {
    html += '<div class="empty-log">Aucune réponse enregistrée pour l\'instant.<br>Commence par répondre à quelques questions !</div>';
  } else {
    // per-mode sections, most recent first within each
    ['lecture','grammaire','conjugaison'].forEach(mode => {
      const entries = [...byMode[mode]].reverse();
      if (entries.length === 0) return;
      const mOk = entries.filter(e=>e.ok).length;
      html += '<div class="log-section"><div class="log-section-title">'
        + modeLabels[mode] + ' &mdash; ' + mOk + '/' + entries.length + ' correctes</div>';
      entries.forEach(e => {
        html += '<div class="log-entry ' + (e.ok ? 'ok' : 'ko') + '">'
          + '<div class="log-icon">' + (e.ok ? '✅' : '❌') + '</div>'
          + '<div class="log-body">';
        if (e.theme && e.theme !== e.mode) html += '<span class="log-theme">' + e.theme + '</span><br>';
        html += '<div class="log-q">' + e.question + '</div>';
        if (e.ok) {
          html += '<div class="log-ans">Réponse : <span class="given">' + e.given + '</span></div>';
        } else {
          html += '<div class="log-ans">'
            + 'Donné : <span class="given">' + e.given + '</span> &nbsp;|&nbsp; '
            + 'Correct : <span class="correct-ans">' + e.correctAns + '</span></div>';
        }
        html += '<div class="log-time">' + fmtDate(e.ts) + '</div>';
        html += '</div></div>';
      });
      html += '</div>';
    });
  }

  html += '<div class="actions" style="margin-top:10px;">'
    + '<button class="btn btn-primary" onclick="backToGame()">&#8592; Retour au jeu</button></div>';

  document.getElementById('mainCard').innerHTML = '<div>' + html + '</div>';
}

function backToGame() {
  document.querySelectorAll('.mode-tab').forEach((t,i) => {
    const modes = ['lecture','grammaire','conjugaison'];
    t.classList.toggle('active', modes[i] === currentMode);
  });
  loadQuestion();
}

function exportCSV() {
  const header = 'Date,Mode,Thème,Question,Réponse donnée,Bonne réponse,Résultat\n';
  const rows = answerLog.map(e => {
    const esc = s => '"' + (s||'').replace(/"/g,'""') + '"';
    return [fmtDate(e.ts), e.mode, e.theme, e.question, e.given, e.correctAns, e.ok ? 'Correct' : 'Faux']
      .map(esc).join(',');
  }).join('\n');
  const blob = new Blob(['\uFEFF' + header + rows], { type:'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'francais_aventure_progres.csv';
  a.click(); URL.revokeObjectURL(url);
}

// Simple exact lookup — no normalization, no stemming
function lookupTranslation(word) {
  return TRANSLATIONS[word.toLowerCase()] || null;
}

// Pre-process HTML string: wrap every word in a clickable span
function linkifyPassage(html) {
  const parts = html.split(/(<[^>]+>)/);
  return parts.map(function(part) {
    if (part.charAt(0) === '<') return part;
    return part.replace(/\S+/g, function(token) {
      // strip surrounding punctuation for display key but keep display intact
      const clean = token.replace(/^[«»"'()\[\].,!?;:\-–—]+|[«»"'()\[\].,!?;:\-–—]+$/g, '');
      if (clean.length < 2) return token;
      return '<span class="w" data-word="' + clean.replace(/"/g,'&quot;') + '">' + token + '</span>';
    });
  }).join('');
}

// Attach delegated click listener on the whole card
function initPassageClicks() {
  const card = document.getElementById('mainCard');
  if (!card) return;
  card.addEventListener('click', function(e) {
    const span = e.target.closest('.w');
    if (!span) { closeDict(); return; }
    const word = span.dataset.word || span.textContent.trim();
    if (!word || word.length < 2) return;
    card.querySelectorAll('.w.active').forEach(s => s.classList.remove('active'));
    span.classList.add('active');
    showTranslation(word, span.getBoundingClientRect());
    e.stopPropagation();
  });
}

function showTranslation(word, rect) {
  const translation = lookupTranslation(word);
  document.getElementById('dictWord').textContent = word;
  const transEl   = document.getElementById('dictTranslation');
  const unknownEl = document.getElementById('dictUnknown');
  if (translation) {
    transEl.textContent = translation;
    transEl.style.display = 'block';
    unknownEl.style.display = 'none';
  } else {
    transEl.style.display = 'none';
    unknownEl.style.display = 'block';
  }
  const tooltip = document.getElementById('dictTooltip');
  tooltip.style.display = 'block';
  const ttW = tooltip.offsetWidth  || 220;
  const ttH = tooltip.offsetHeight || 80;
  const gap = 8;
  let top  = rect.bottom + gap;
  if (top + ttH > window.innerHeight - gap) top = rect.top - ttH - gap;
  if (top < gap) top = gap;
  let left = rect.left;
  if (left + ttW > window.innerWidth - gap) left = window.innerWidth - ttW - gap;
  if (left < gap) left = gap;
  tooltip.style.top  = top  + 'px';
  tooltip.style.left = left + 'px';
}

document.addEventListener('click', function(e) {
  const tt = document.getElementById('dictTooltip');
  if (tt && !tt.contains(e.target)) closeDict();
});

function closeDict() {
  document.getElementById('dictTooltip').style.display = 'none';
  document.querySelectorAll('.w.active').forEach(s => s.classList.remove('active'));
}
